CONFIG_ZMK_KEYBOARD_NAME="ArrowKeeb"

# BLE is disabled on this clone nice!nano. Zephyr's BT_LL_SW_SPLIT
# controller never responds to HCI_RESET on this hardware: bt_enable()
# hangs in zmk_ble_init at SYS_INIT, then BT_ASSERT_MSG (10s HCI_CMD_TIMEOUT)
# panics the kernel before main() runs — display + settings_load never start.
# All three LFCLK sources (RC, RC+500PPM+CALIBRATION, SYNTH) reproduced
# the same hang. KMK BLE works on this same chip because it uses Adafruit's
# SoftDevice; vanilla Zephyr's controller is incompatible. Re-enabling BLE
# would require switching to nRF Connect SDK + SoftDevice controller.
CONFIG_ZMK_BLE=n

# Sleep - disabled until wakeup source is configured
CONFIG_ZMK_SLEEP=n
# CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000


# Enable mouse
CONFIG_ZMK_POINTING=y

CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_CUSTOM=y
CONFIG_ZMK_DISPLAY_BLANK_ON_IDLE=n
# Larger font for the layer name widget (and any other widget that uses
# theme->font_small via lv_theme_get_font_small).
CONFIG_ZMK_LV_FONT_DEFAULT_SMALL_MONTSERRAT_24=y

CONFIG_ZMK_WIDGET_LAYER_STATUS=y
# Custom status screen path doesn't carry the BUILT_IN's `imply LV_USE_THEME_MONO`,
# and ZMK_DISPLAY implies LV_CONF_MINIMAL which blocks the mono theme's
# default-y. Without the mono theme, theme->font_small isn't set and widgets
# fall back to LVGL's default font (which lacks LV_SYMBOL_KEYBOARD etc.).
CONFIG_LV_USE_THEME_MONO=y

# OLED brightness (0–255); driver default is 128.
CONFIG_SSD1306_DEFAULT_CONTRAST=32
CONFIG_ZMK_DISPLAY_INVERT=y
# Run display rendering on its own work queue so a stalled I2C transfer to
# the OLED can't block the system work queue (which also services USB
# control-transfer / HID callbacks).
CONFIG_ZMK_DISPLAY_WORK_QUEUE_DEDICATED=y
